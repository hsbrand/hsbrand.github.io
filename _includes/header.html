<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Hockey Stock home">
    <span class="brand-mark-wrap"><img src="{{ '/assets/images/brand/hockey-stock-mark.jpg' | relative_url }}" alt="" class="brand-mark"></span>
    <span class="brand-wordmark">HOCKEY STOCK</span>
  </a>
  <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
  <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.label }}</a>
    {% endfor %}
  </nav>
</header>
